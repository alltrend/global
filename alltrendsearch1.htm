<style>
    body {
      margin: 0;
      height: 100vh;
      background: #005FAF;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 5px;
    }

    h1 {
      font-weight: 900;
      margin-top: 0; 
      margin-bottom: 0;    /* 下方距離可依需求調整 */
      text-align: center;
      font-size: 3.8vw;
      font-family: "Noto Sans TC", "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      animation: colorChange 20s infinite alternate;
      text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff;
      z-index: 2;
    }

    @keyframes colorChange {
      0% { color: #3399FF; }
      25% { color: #00FFFF; }
      50% { color: #9966FF; }
      75% { color: #FF00FF; }
      100% { color: #FF99FF; }
    }

    .search-box {
      z-index: 2;
      margin-top: 10px;
      text-align: center;
    }

    input, select, button {
      font-size: 18px;
      padding: 10px;
      margin: 5px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .breathing-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, #3399FF, transparent);
      animation: breathe 6s infinite alternate, circleColor 12s infinite alternate;
      filter: blur(60px); /* 模糊化邊緣 */
      z-index: 1;
    }

    @keyframes breathe {
      from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
      to { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    @keyframes circleColor {
      0% { background: radial-gradient(circle, #3399FF, transparent); }
      25% { background: radial-gradient(circle, #00FFFF, transparent); }
      50% { background: radial-gradient(circle, #9966FF, transparent); }
      75% { background: radial-gradient(circle, #FF00FF, transparent); }
      100% { background: radial-gradient(circle, #FF99FF, transparent); }
    }

    #results {
      z-index: 2;
      color: #fff;
      margin-top: 15px;
      text-align: center;
    }
    
    
/* Reset */
html,body {
  height:100%;
  overflow-x: hidden;
  overflow-y: auto;
}


/* 📱 小型手機（小於 480px） */
@media (max-width: 479px) {
  .toolbar {
    flex-direction: column;
    gap: 6px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 13px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 中型手機（480px 到 767px） */
@media (min-width: 480px) and (max-width: 767px) {
  .toolbar {
    flex-direction: column;
    gap: 8px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 14px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 大型手機／小平板（768px 到 1023px） */
@media (min-width: 768px) and (max-width: 1023px) {
  .toolbar {
    flex-direction: row;
    gap: 12px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: auto;
  }
  table {
    font-size: 15px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
</style>

        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: 15 + Math.random() * 15,
          color: colors[Math.floor(Math.random() * colors.length)],
          dx: (Math.random() - 0.5) * 2,
          dy: (Math.random() - 0.5) * 2
        });
      }
    }
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 30; /* 粒子光暈模糊 */
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(drawParticles);
    }
