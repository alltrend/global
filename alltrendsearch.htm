    animation: rainbow 20s infinite linear;
    text-shadow: 0 0 30px currentColor, 0 0 50px currentColor;
    }
    
  @keyframes rainbow {
  /* 粉紅系起始 */
  0%   { color: #FF00CC; text-shadow: 0 0 50px #FF00CC; }
  5%   { color: #FF3399; text-shadow: 0 0 50px #FF3399; }

  66%  { color: #3399FF; text-shadow: 0 0 50px #3399FF; }
  72%  { color: #66CCFF; text-shadow: 0 0 50px #66CCFF; }
  78%  { color: #99CCFF; text-shadow: 0 0 50px #99CCFF; }
  /* 紫色收束（補你想要的 #9966FF / #FF00FF） */
  84%  { color: #9966FF; text-shadow: 0 0 50px #9966FF; }
  90%  { color: #FF00FF; text-shadow: 0 0 50px #FF00FF; }
  96%  { color: #FF99FF; text-shadow: 0 0 50px #FF99FF; }
  /* 回到起點 */
  100% { color: #FF00CC; text-shadow: 0 0 50px #FF00CC; }
}

<script>
function smartSearch(){
  const text = document.getElementById("input").value.trim();
  const manualChoice = document.getElementById("engineSelect").value;
  if(!text) return;
  const query = encodeURIComponent(text);
  const engines = {
  google: "https://www.google.com/search?q=",
  bing: "https://www.bing.com/search?q=",
  yahoo: "https://search.yahoo.com/search?p=",
  baidu: "https://www.baidu.com/s?wd=",
  youtube: "https://www.youtube.com/results?search_query=",
  shopee: "https://shopee.tw/search?keyword=",
  ubereats: "https://www.ubereats.com/tw/search?q=",
  booking: "https://www.booking.com/searchresults.html?ss=",
  stackoverflow: "https://stackoverflow.com/search?q=",
  wikipedia: "https://zh.wikipedia.org/wiki/",
  duckduckgo: "https://duckduckgo.com/?q=",
  brave: "https://search.brave.com/search?q=",
  startpage: "https://www.startpage.com/do/search?q=",
  sogou: "https://www.sogou.com/web?query=",
  naver: "https://search.naver.com/search.naver?query=",
  ecosia: "https://www.ecosia.org/search?q=",
  yandex: "https://yandex.com/search/?text=",
  yahoodic: "https://tw.dictionary.search.yahoo.com/search?p=",
  ruten: "https://www.ruten.com.tw/find/?q=",
  pixnet: "https://www.pixnet.net/searcharticle?q=",
  reddit: "https://www.reddit.com/search/?q=",
  tieba: "https://tieba.baidu.com/f?kw=",
  pchome: "https://shopping.pchome.com.tw/?q=",

  amazon: "https://www.amazon.com/s?k=",
  douban: "https://www.douban.com/search?q=",
  zhihu: "https://www.zhihu.com/search?q=",
  wikipedia: "https://zh.wikipedia.org/wiki/",
  books: "https://search.books.com.tw/search/query/key/",
  dictcn: "https://dict.cn/",
  iciba: "https://www.iciba.com/word?w=",
  youdao: "https://www.youdao.com/result?word=",
  translate: "https://translate.google.com/?sl=auto&tl=zh-TW&text=",
  define: "https://www.dictionary.com/browse/",
  weather: "https://www.google.com/search?q=weather+",
  time: "https://www.google.com/search?q=time+",
  stock: "https://www.google.com/search?q=",
  booking: "https://www.booking.com/searchresults.html?ss=",
  taiwanstay: "https://taiwanstay.net.tw/search?query=",
  funtime: "https://www.funtime.com.tw/search/?q=",
  eztravel: "https://www.eztravel.com.tw/search?q=",
  liontravel: "https://www.liontravel.com/search?q=",
  ubereats: "https://www.ubereats.com/tw/search?q=",
  dominos: "https://order.dominos.com.tw/search?q=",
  foodpanda: "https://www.foodpanda.com.tw/search?q=",
  myhealth: "https://myhealthbank.nhi.gov.tw/IHKE3000/IHKE3115S03",
  nhiapp: "https://www.nhi.gov.tw/ch/cp-3166-56af4-2457-1.html",
  thsr: "https://www.thsrc.com.tw/",
  tra: "https://www.railway.gov.tw/tra-tip-web/tip",
  bus: "https://www.taiwanbus.tw/eBUSPage/Query/Query.aspx",

  etax: "https://www.etax.nat.gov.tw/etwmain/",
  douyin: "https://www.douyin.com/search/",

  youku: "https://so.youku.com/search_video/q_",
  wetv: "https://wetv.vip/search?q=",

  instagram: "https://www.instagram.com/explore/tags/",

  twitter: "https://twitter.com/search?q=",

  medium: "https://medium.com/search?q=",
  stackoverflow: "https://stackoverflow.com/search?q=",
  github: "https://github.com/search?q=",

  ecosia: "https://www.ecosia.org/search?q=",

  agoda: "https://www.agoda.com/zh-tw/search?city=",
  airbnb: "https://www.airbnb.com/s/",
  trip: "https://www.trip.com/hotels/search?keyword=",
  hotels: "https://www.hotels.com/search.do?q=",
  expedia: "https://www.expedia.com/Hotel-Search?destination=",
  asiayo: "https://www.asiayo.com/zh-tw/search/?q=",
  kkday: "https://www.kkday.com/zh-tw/product/search?keyword=",
  klook: "https://www.klook.com/zh-TW/search/?q=",
  funnow: "https://www.funnow.com/zh-TW/search?keyword="
  };
  
  let chosen = "google"; // 預設 Google
  if(manualChoice){ 
    // 手動選擇優先
    chosen = manualChoice;
  } else {
    // 自動判斷
    if(/中國|大陸|北京|上海/.test(text)) chosen = "baidu";
    else if(/影片|教學|MV|vlog/.test(text)) chosen = "youtube";
    else if(/飯店|旅遊|住宿|機票/.test(text)) chosen = "booking";
    else if(/程式|代碼|bug|技術/.test(text)) chosen = "stackoverflow";
    else if(/是什麼|定義|知識|百科/.test(text)) chosen = "wikipedia";
    else if(/外送|吃|餐廳|美食/.test(text)) chosen = "ubereats";
    else if(/買|商品|價格|便宜/.test(text)) chosen = "shopee";
    else if(/新聞|時事/.test(text)) chosen = "yahoo";
    else if(/圖片|AI|技術/.test(text)) chosen = "bing";

    // 機率探索：20% 機率隨機挑其它引擎
    if(Math.random() < 0.2){
      const extras = ["duckduckgo","brave","startpage","sogou","naver","ecosia","yandex"];
      chosen = extras[Math.floor(Math.random()*extras.length)];
    }
  }

  const url = engines[chosen] + query;
  window.open(url, "_blank");
  
  let countdown = 20; // 倒數秒數，可自行調整

    ⏳ ${countdown} 秒後自動開啟 alltrend.github.io `;

    clearInterval(timer);
    // 🚀 倒數結束後，另開新分頁執行 alltrend.github.io
    window.open("http://alltrend.github.io", "_blank"); } },1000);

    // 搜完後清空並自動聚焦
  document.getElementById("input").value = "";
  document.getElementById("input").focus();
}

document.getElementById("input").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    smartSearch(); 
    document.getElementById("input").value = ""; // 搜完後清空輸入框
  }
});

// 粒子背景效果
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
function createParticles(){
  particles = []; // 清空舊的粒子
  for(let i=0; i<90; i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*23+13,
      color: `hsla(${Math.random()*360}, 70%, 60%, ${0.2 + Math.random()*0.3})`,
      speedX: (Math.random()-0.5)*0.5,
      speedY: (Math.random()-0.5)*0.5
    });
  }
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 40;
    ctx.shadowColor = p.color;
    ctx.fill();
    p.x += p.speedX;
    p.y += p.speedY;
    if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });
}

function animate(){
  drawParticles();
  requestAnimationFrame(animate);
}
createParticles();
animate();

// ⭐ 視窗改變 → 重設畫布 + 粒子重分佈
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createParticles(); // 重新分佈粒子
}
window.addEventListener("resize", resizeCanvas);


window.addEventListener("DOMContentLoaded",()=>{
  const params = new URLSearchParams(window.location.search);
  const q = params.get("q");
  if(q){
    document.getElementById("input").value = q;
    smartSearch(); // 自動觸發搜尋
  }
});

  '"PingFang TC"',        // 蘋方字體
  'sans-serif'            // 保底
];
// 隨機挑一個字型

// 套用到 h1，並加上完整 fallback 順序
document.querySelector("h1").style.fontFamily =
`${randomFont}, "Noto Sans TC", "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", sans-serif`;
// 綁定 Enter 事件
document.getElementById("searchBox").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault(); // 防止表單預設提交
    search(); // 呼叫搜尋函式
  }
});
