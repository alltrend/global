<style>
body { 
  margin:0; 
  background:linear-gradient(180deg, #001f3f, #004080); 
  color:#0ff; 
  text-align:center; 
  font-family:sans-serif;
  overflow-y:auto;
  overflow-x:hidden;
}

h1 { margin-top:20px; }

canvas {
  display:block;
  margin:20px auto;
  background:transparent; /* 背景透明 */
  border:none;            /* 去除框線 */
}

.knob {
  width:120px; height:120px;
  border-radius:50%;
  border:6px solid #0ff;
  margin:20px auto;
  animation: spin 6s linear infinite;
  box-shadow: 0 0 40px #0ff;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

/* 🌈 中央呼吸光球 */
.breathing-bg {
  position:fixed;
  top:50%;
  left:50%;
  width:800px;
  height:800px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  filter: blur(80px);
  z-index:-2;
  animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0% { background:hsl(200,100%,50%); transform:translate(-50%,-50%) scale(0.8); opacity:0.5; }
  50% { background:hsl(320,100%,60%); transform:translate(-50%,-50%) scale(1.3); opacity:0.9; }
  100% { background:hsl(100,100%,50%); transform:translate(-50%,-50%) scale(0.8); opacity:0.5; }
}

/* 🌫 粒子層 */
canvas#particles {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-3;
  pointer-events:none;
}

select { margin:10px; padding:5px; font-size:16px; }
#info { margin-top:20px; }


.rainbow-flow {
  font-size: 2.5em;
  font-weight: bold;
  background: linear-gradient(
    to right,
    red,
    orange,
    yellow,
    cyan,       /* 淺藍 */
    #66B3FF,    /* 亮藍 */
    pink,
    gold,
    #40E0D0,    /* 藍綠偏亮藍 */
    #FF69B4,    /* 桃紅 */
    #FFD700     /* 金色 */
  );
  background-size: 600% auto; /* 漸層範圍放大，顏色更明顯 */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbow-scroll 12s linear infinite;
}
/* 彩虹持續流動效果：由左至右 */
@keyframes rainbow-scroll {
  from { background-position: 0% 50%; }
  to   { background-position: 100% 50%; }
}


html, body, header, .title {
  margin: 0 !important;
  padding: 0 !important;
}


/* Reset */
html,body {
height:100%;
  overflow-x: hidden;   /* 禁止橫向滾動 */
  overflow-y: auto;     /* ✅ 允許垂直滾動 */
}


/* 📱 小型手機（小於 480px） */
@media (max-width: 479px) {
  .toolbar {
    flex-direction: column;
    gap: 6px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 13px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 中型手機（480px 到 767px） */

/* 📱 大型手機／小平板（768px 到 1023px） */

}

<div id="info">
  <h2 id="songTitle">🎶 準備播放...</h2>
  <p id="time">00:00 / 00:00</p>
</div>

<audio id="player" controls></audio>
<script>
// ===== 基本 =====
const audio = document.getElementById("player");
const playlist = document.getElementById("playlist");
const songTitle = document.getElementById("songTitle");
const time = document.getElementById("time");

audio.crossOrigin = "anonymous";

// ===== AudioContext =====
let ctx, analyser, oscAnalyser;

function initAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaElementSource(audio);

    analyser = ctx.createAnalyser();
    oscAnalyser = ctx.createAnalyser();

    analyser.fftSize = 256;
    oscAnalyser.fftSize = 2048;

    src.connect(analyser);
    src.connect(oscAnalyser);

    analyser.connect(ctx.destination);
    oscAnalyser.connect(ctx.destination);
  }
}

async function startPlayback() {
  initAudio();
  if (ctx.state === "suspended") await ctx.resume();
  try { await audio.play(); }
  catch(e){ console.log("播放被擋:", e); }
}

// 點擊解鎖
document.body.addEventListener("click", startPlayback, { once:true });

// 切歌
playlist.addEventListener("change", async () => {
  audio.src = playlist.value;
  songTitle.textContent = "🎶 正在播放：" + playlist.options[playlist.selectedIndex].text;
  await startPlayback();
});

// 時間顯示
audio.addEventListener("timeupdate", () => {
  const f = s => isNaN(s) ? "00:00" :
  `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  time.textContent = `${f(audio.currentTime)} / ${f(audio.duration)}`;
});

// ===== EQ =====
const eqCanvas = document.getElementById("eq");
const eqCtx = eqCanvas.getContext("2d");

let hueShift = 0;
let direction = 1;       // 1 = 左→右, -1 = 右→左
let frameCount = 0;      // 計數器
const switchInterval = 300; // 跑多少幀再換方向 (可調整) 200 約3秒

function drawEQ(){
  requestAnimationFrame(drawEQ);
  if (!analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  // 背景透明
  eqCtx.clearRect(0,0,eqCanvas.width,eqCanvas.height);

  // 調整速度：這裡的 +3 就是顏色流動速度
  hueShift = (hueShift + 3) % 360;
  frameCount++;

  // 每隔一段時間才切換方向
  if (frameCount >= switchInterval) {
    direction *= -1;
    frameCount = 0;
  }

  let x=0;
  const w=(eqCanvas.width/data.length)*2.5;

  for(let i=0;i<data.length;i++){
    let h=data[i];
    // 根據方向決定色相偏移
    let hue = (i*10*direction + h/2 + hueShift) % 360;
    let sat = Math.min(100, 70 + h/2);
    let light = Math.min(80, 40 + h/3);

    eqCtx.fillStyle = `hsl(${hue},${sat}%,${light}%)`;
    eqCtx.fillRect(x, eqCanvas.height - h/2, w, h/2);
    x += w + 1;
  }
}
drawEQ();


// ===== OSC =====
const oscCanvas = document.getElementById("osc");
const oscCtx = oscCanvas.getContext("2d");

function drawOsc(){
  requestAnimationFrame(drawOsc);
  if (!oscAnalyser) return;

  const data = new Uint8Array(oscAnalyser.fftSize);
  oscAnalyser.getByteTimeDomainData(data);

  oscCtx.clearRect(0,0,oscCanvas.width,oscCanvas.height); // 背景透明
  oscCtx.beginPath();
  oscCtx.lineWidth = 3; // ★ 加這行，讓波形變粗

  let slice=oscCanvas.width/data.length;
  let x=0;

  for(let i=0;i<data.length;i++){
    let v=data[i]/128.0;
    let y=v*oscCanvas.height/2;
    if(i===0) oscCtx.moveTo(x,y);
    else oscCtx.lineTo(x,y);
    x+=slice;
  }

  // 避免初始水平線：只有在有播放時才畫
  if (!audio.paused && audio.currentTime>0) {
    oscCtx.strokeStyle="#0ff";
    oscCtx.stroke();
  }
}
drawOsc();

// ===== 粒子（霧化） =====
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
pCanvas.width=window.innerWidth;
pCanvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*pCanvas.width,
    y:Math.random()*pCanvas.height,
    r:Math.random()*12+8,
    dx:(Math.random()-0.5)*1.5,
    dy:(Math.random()-0.5)*1.5,
    color:`hsl(${Math.random()*360},100%,50%)`
  });
}

function drawParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);

  particles.forEach(p=>{
    let g = pCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2);
    g.addColorStop(0,p.color);
    g.addColorStop(1,"transparent");

    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r*2,0,Math.PI*2);
    pCtx.fillStyle=g;
    pCtx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>pCanvas.width) p.dx*=-1;
    if(p.y<0||p.y>pCanvas.height) p.dy*=-1;
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
