<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界時鐘</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


    body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    padding: 20px;
    color: #333;
    animation: bgChange 90s infinite; /* 36色，每色5秒 */
}
/* 每個顏色持續 5 秒，總共 36 色 = 180 秒循環 */
@keyframes bgChange {
    0%   { background: #ff9a9e; }
    2.7% { background: #fad0c4; }
    5.5% { background: #fbc2eb; }
    8.3% { background: #a6c1ee; }
    11.1% { background: #fddb92; }
    13.8% { background: #d1fdff; }
    16.6% { background: #ffecd2; }
    19.4% { background: #fcb69f; }
    22.2% { background: #ffdde1; }
    25%   { background: #ee9ca7; }
    27.7% { background: #a1c4fd; }
    30.5% { background: #c2e9fb; }
    33.3% { background: #fceabb; }
    36.1% { background: #f8b500; }
    38.8% { background: #fccb90; }
    41.6% { background: #d57eeb; }
    44.4% { background: #f6d365; }
    47.2% { background: #fda085; }
    50%   { background: #ffafbd; }
    52.7% { background: #ffc3a0; }
    55.5% { background: #fbc2eb; }
    58.3% { background: #a1c4fd; }
    61.1% { background: #fddb92; }
    63.8% { background: #d1fdff; }
    66.6% { background: #ffecd2; }
    69.4% { background: #fcb69f; }
    72.2% { background: #ffdde1; }
    75%   { background: #ee9ca7; }
    77.7% { background: #a1c4fd; }
    80.5% { background: #c2e9fb; }
    83.3% { background: #fceabb; }
    86.1% { background: #f8b500; }
    88.8% { background: #fccb90; }
    91.6% { background: #d57eeb; }
    94.4% { background: #f6d365; }
    97.2% { background: #fda085; }
    100%  { background: #ff9a9e; } /* 回到第一色 */
}


        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
            animation: slideDown 0.6s ease-out;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {opacity: 0; transform: translateY(-30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(12px);
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .clock-card:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(102,126,234,0.6);
        }

        .timezone-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
        }

        .clock {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            margin: 20px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .timezone-offset {
            font-size: 0.9em;
            color: #eee;
            margin-top: 10px;
        }

        .local-time {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .local-time h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .local-clock {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .local-clock .time {
            font-size: 4em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }

        .local-clock .date {
            font-size: 1.3em;
            color: #fff;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            h1 {font-size: 2em;}
            .clocks-grid {grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;}
            .clock {font-size: 1.8em;}
            .local-clock .time {font-size: 2.5em;}
            .local-clock .date {font-size: 1em;}
        }

        @media (max-width: 480px) {
            h1 {font-size: 1.5em;}
            .clocks-grid {grid-template-columns: 1fr;}
            .clock {font-size: 1.5em;}
            .local-clock .time {font-size: 2em;}
        }
</style>
</head>
<body>
    <div class="container">
        <h1>世界時鐘</h1>
        <p class="subtitle">查看不同時區的目前時間</p>
        
        <div class="clocks-grid">
            <div class="clock-card"><div class="timezone-name">紐約 (EST)</div><div class="clock" id="clock-newyork">00:00:00</div><div class="timezone-offset">UTC-5</div></div>
            <div class="clock-card"><div class="timezone-name">倫敦 (GMT)</div><div class="clock" id="clock-london">00:00:00</div><div class="timezone-offset">UTC+0</div></div>
            <div class="clock-card"><div class="timezone-name">東京 (JST)</div><div class="clock" id="clock-tokyo">00:00:00</div><div class="timezone-offset">UTC+9</div></div>
            <div class="clock-card"><div class="timezone-name">雪梨 (AEDT)</div><div class="clock" id="clock-sydney">00:00:00</div><div class="timezone-offset">UTC+11</div></div>
            <div class="clock-card"><div class="timezone-name">杜拜 (GST)</div><div class="clock" id="clock-dubai">00:00:00</div><div class="timezone-offset">UTC+4</div></div>
            <div class="clock-card"><div class="timezone-name">新加坡 (SGT)</div><div class="clock" id="clock-singapore">00:00:00</div><div class="timezone-offset">UTC+8</div></div>
            <div class="clock-card"><div class="timezone-name">洛杉磯 (PST)</div><div class="clock" id="clock-losangeles">00:00:00</div><div class="timezone-offset">UTC-8</div></div>
            <div class="clock-card"><div class="timezone-name">香港 (HKT)</div><div class="clock" id="clock-hongkong">00:00:00</div><div class="timezone-offset">UTC+8</div></div>
        </div>
        
        <div class="local-time">
            <h2>你的本地時間</h2>
            <div class="local-clock">
                <div class="time" id="local-time">00:00:00</div>
                <div class="date" id="local-date">載入中...</div>
            </div>
        </div>
    </div>

    <script>
    function updateClock() {
        var now = new Date();
        var timezones = [
            { id: 'newyork', offset: -5 },
            { id: 'london', offset: 0 },
            { id: 'tokyo', offset: 9 },
            { id: 'sydney', offset: 11 },
            { id: 'dubai', offset: 4 },
            { id: 'singapore', offset: 8 },
            { id: 'losangeles', offset: -8 },
            { id: 'hongkong', offset: 8 }
        ];
        
        for (var i = 0; i < timezones.length; i++) {
            var tz = timezones[i];
            var utc = now.getTime() + now.getTimezoneOffset() * 60000;
            var tzTime = new Date(utc + (3600000 * tz.offset));
            
            var hours = tzTime.getHours().toString().padStart(2, '0');
            var minutes = tzTime.getMinutes().toString().padStart(2, '0');
            var seconds = tzTime.getSeconds().toString().padStart(2, '0');
            
            var element = document.getElementById('clock-' + tz.id);
            if (element) {
                element.textContent = hours + ':' + minutes + ':' + seconds;
            }
        }
        
        var localHours = now.getHours().toString().padStart(2, '0');
        var localMinutes = now.getMinutes().toString().padStart(2, '0');
        var localSeconds = now.getSeconds().toString().padStart(2, '0');
        
        var localTimeElement = document.getElementById('local-time');
        if (localTimeElement) {
            localTimeElement.textContent = localHours + ':' + localMinutes + ':' + localSeconds;
        }
        
        var dateElement = document.getElementById('local-date');
        if (dateElement) {
            var weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            var months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            var weekday = weekdays[now.getDay()];
            var month = months[now.getMonth()];
            var date = now.getDate();
            var year = now.getFullYear();
            dateElement.textContent = year + '年 ' + month + ' ' + date + '日 ' + weekday;
        }
    }

    updateClock();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
