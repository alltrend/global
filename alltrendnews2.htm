<script>
function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("show"); }
function scrollCarouselLeft(){
document.getElementById("siteCarousel").scrollBy({left:-200, behavior:'smooth'}); }
function scrollCarouselRight(){
document.getElementById("siteCarousel").scrollBy({left:200, behavior:'smooth'}); }

// 使用者投稿：新增連結接在新聞列表下方
function addLink(){
  const title = document.getElementById("newTitle").value.trim();
  const url = document.getElementById("newUrl").value.trim();
  if(title && url){
    let saved = JSON.parse(localStorage.getItem("userLinks") || "[]");
    saved.push({title, url, date:new Date().toLocaleString("zh-TW")});
    localStorage.setItem("userLinks", JSON.stringify(saved));
    document.getElementById("newTitle").value = "";
    document.getElementById("newUrl").value = "";
    renderUserLinks();
  } else {
    alert("請輸入完整的標題與網址！");
  }
}
function clearLinks(){
  localStorage.removeItem("userLinks");
  renderUserLinks();
  alert("已清理本地儲存！");
}
function exportLinks(){
  const data = localStorage.getItem("userLinks") || "[]";
  const blob = new Blob([data], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "links.json";
  a.click();
}
function exportLinksTxt(){
  const data = JSON.parse(localStorage.getItem("userLinks") || "[]");
  const txt = data.map(l=>`${l.title} - ${l.url} (${l.date})`).join("\n");
  const blob = new Blob([txt], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "links.txt";
  a.click();
}
function importLinks(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      let content = e.target.result;
      let data;
      if(file.name.endsWith(".json")){
        data = JSON.parse(content);
      } else {
        data = content.split("\n").map(line=>{
          const parts = line.split(" - ");
          return {title:parts[0], url:parts[1], date:"匯入"};
        });
      }
      localStorage.setItem("userLinks", JSON.stringify(data));
      renderUserLinks();
      alert("匯入成功！");
    } catch(err){
      alert("匯入失敗：" + err);
    }
  };
  reader.readAsText(file);
}
function deleteLink(index){
  let data = JSON.parse(localStorage.getItem("userLinks") || "[]");
  data.splice(index, 1);
  localStorage.setItem("userLinks", JSON.stringify(data));
  renderUserLinks();
}
function renderUserLinks(){
  const userList = document.getElementById("userList");
  userList.innerHTML = ""; // 只清空投稿，不動新聞
  const data = JSON.parse(localStorage.getItem("userLinks") || "[]");
  data.forEach((l, index)=>{
    const li = document.createElement("li");
    li.innerHTML = `
      <a href="${l.url}" target="_blank">${l.title}</a>
      <div class="stats">來源: 使用者投稿 | 日期: ${l.date}</div>
      <button onclick="deleteLink(${index})">刪除</button>
    `;
    userList.appendChild(li);
  });
}

];

let rssLinks = [];

const itemsPerPage = 15;

// 自動評分系統
function autoScore(title, source, date){
  let score = 0;
  score += Math.min(title.length, 50);
  const keywords = ["快訊","重大","獨家","速報","最新","Breaking","Exclusive"];
  keywords.forEach(kw=>{ if(title.includes(kw)) score += 20; });
  const pubDate = new Date(date);
  const now = new Date();
  const diffHours = (now - pubDate) / (1000*60*60);
  if(diffHours <= 24) score += 30;
  else if(diffHours <= 168) score += 15;
  return score;
}

// 抓取 RSS
async function fetchRSS(rssUrl){
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl));
    const data = await res.json();
    if(data.items && data.items.length > 0){
      return data.items.map(it => ({
        title: it.title,
        url: it.link,
        source: data.feed?.title || rssUrl,
        date: it.pubDate || new Date(),
        clicks: 0
      }));
    }
  } catch(e){ console.warn("rss2json 抓取失敗:", rssUrl, e); }
  return [];
}

// 抓取所有 RSS
async function fetchAll(){
  let items = [];
  const results = await Promise.all(rssList.map(rss => fetchRSS(rss)));
  results.forEach(feedItems => items.push(...feedItems));
  const seen = new Set();
  rssLinks = items.filter(link=>{
    if(seen.has(link.url)) return false;
    seen.add(link.url);
    return true;
  });
  renderPage();
}

// 分頁顯示
function renderPage(){
  const list = document.getElementById("rssList");
  list.innerHTML = "";

  let filteredLinks = rssLinks;
  if(searchKeyword.trim() !== ""){
    filteredLinks = rssLinks.filter(link => 
      link.title.toLowerCase().includes(searchKeyword.toLowerCase())
    );
  }

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = filteredLinks.slice(start, end);

  pageItems.forEach(link=>{
    const li = document.createElement("li");
    const type = link.source.includes("cna") ? "domestic" : "international";
    const pubDate = new Date(link.date).toLocaleString("zh-TW");
    li.innerHTML = `
      <a href="${link.url}" target="_blank">${link.title}</a>
      <span class="badge ${type}">${type}</span>
      <div class="stats">
        來源: ${link.source || "未知"} 
        | 日期: ${pubDate} 
        | 點擊次數: ${link.clicks||0} 
        | 自動評分: ${autoScore(link.title, link.source, link.date)} 
        | <a href="https://translate.google.com/translate?hl=zh-TW&sl=auto&u=${encodeURIComponent(link.url)}" target="_blank">🌐 Google翻譯</a>
      </div>
    `;
    list.appendChild(li);
  });

  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";
  const totalPages = Math.ceil(filteredLinks.length / itemsPerPage);

  if(currentPage > 1){
    const prevBtn = document.createElement("button");
    prevBtn.textContent = "上一頁";
    prevBtn.onclick = ()=>{ currentPage--; renderPage(); };
    pagination.appendChild(prevBtn);
  }

  for(let i=1; i<=totalPages; i++){
    const btn = document.createElement("button");
    btn.textContent = i;
    btn.onclick = ()=>{ currentPage = i; renderPage(); };
    if(i === currentPage) btn.style.fontWeight = "bold";
    pagination.appendChild(btn);
  }

  if(currentPage < totalPages){
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "下一頁";
    nextBtn.onclick = ()=>{ currentPage++; renderPage(); };
    pagination.appendChild(nextBtn);
  }
}

// 初始化

function setColor(c){
  if(!c) return;
  document.body.style.background = c;
  const rgb = parseInt(c.slice(1),16);
  const r=(rgb>>16)&255,g=(rgb>>8)&255,b=rgb&255;
  const brightness=(r*299+g*587+b*114)/1000;
  document.body.style.color=brightness<128?"#fff":"#000";
}


// 字型隨機套用
const fonts = [
  '"Noto Sans TC"',       // 思源黑體
  '"Noto Serif TC"',      // 思源宋體
  '"Microsoft JhengHei"', // 微軟正黑體
  '"PingFang TC"',        // 蘋方字體
  'sans-serif'            // 保底
];
const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
document.querySelector("h1").style.fontFamily =
`${randomFont}, "Noto Sans TC", "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", sans-serif`;
</script>
