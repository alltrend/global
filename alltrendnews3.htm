<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<title>🌍全方位網路地球分析器🔎</title>
<style>
    body { font-family: Arial, sans-serif; background: #97CBFF; margin: 20px; }
    h1 { color: #005AB5;
    margin-top: 5px !important;   /* 強制把上方間距設為 0 */
    margin-bottom: 0px !important; /* 視需要調整下方間距 */
    font-size: 3vw;
    font-weight: 900;
    font-family: "Noto Sans TC", "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
    text-shadow:3px 3px 5px #0080FF; }
    nav ul { list-style: none; padding: 0; display: flex; gap: 15px; }
    nav li { display: inline; }
    section { margin-top: 2px; padding: 15px; background: #fff; border: 1px solid #ccc; }
    .badge { margin-left: 10px; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
    .news { background: #3498db; color: #fff; }
    .stats { font-size: 0.8em; color: #7f8c8d; margin-top: 5px; }
    .pagination { margin-top: 20px; }
    .pagination button { margin: 0 5px; padding: 5px 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    
    
  html, body, header, .title {
  margin: 0 !important;
  padding: 0 !important;
}


/* Reset */
html,body {
height:100%;
  overflow-x: hidden;   /* 禁止橫向滾動 */
  overflow-y: auto;     /* ✅ 允許垂直滾動 */
}


/* 📱 小型手機（小於 480px） */
@media (max-width: 479px) {
  .toolbar {
    flex-direction: column;
    gap: 6px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 13px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 中型手機（480px 到 767px） */
@media (min-width: 480px) and (max-width: 767px) {
  .toolbar {
    flex-direction: column;
    gap: 8px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 14px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 大型手機／小平板（768px 到 1023px） */
@media (min-width: 768px) and (max-width: 1023px) {
  .toolbar {
    flex-direction: row;
    gap: 12px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: auto;
  }
  table {
    font-size: 15px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
<header>
<h1>🌍全方位網路地球分析器🔎</h1>
<nav>
<ul>
<li><a href="#news">新聞</a></li>
<li><a href="#population">人口</a></li>
<li><a href="#economy">經濟</a></li>
<li><a href="#environment">環境</a></li>
</ul>
</nav>
</header>

<!-- 📰 新聞模組 -->
<section id="news">
<h2>📰 新聞模組</h2>
<p>台灣主要新聞 + 外國 / NASA新聞</p>
<ul id="linkList"></ul>
<div class="pagination" id="pagination"></div>
</section>

<!-- 👥 人口模組 -->
<section id="population">
<h2>👥 人口模組</h2>
<table id="population-table">
<thead>
<tr><th>國家</th><th>人口 (百萬)</th></tr>
</thead>
<tbody></tbody>
</table>
</section>

<!-- 💹 經濟模組 -->
<section id="economy">
<h2>💹 經濟模組</h2>
<canvas id="economy-chart"></canvas>
</section>

<!-- 🌱 環境模組 -->
<section id="environment">
<h2>🌱 環境模組</h2>
<div id="map" style="height:400px;"></div>
</section>
<script>
// ===== RSS 設定 =====
const rssList = [
// 台灣新聞
  "https://www.cna.com.tw/rss.aspx",
  "https://news.ltn.com.tw/rss/all.xml",
  "https://udn.com/rssfeed/news/1/2/0?ch=news",
  "https://www.ettoday.net/rss/news.xml",
  "https://tw.news.yahoo.com/rss",
  "https://news.tvbs.com.tw/rss/news.xml",
  "https://www.storm.mg/rss/latest",
  "https://newtalk.tw/rss",
  "https://www.nownews.com/rss",
// 國外新聞
  "https://feeds.bbci.co.uk/news/world/rss.xml",
  "https://rss.cnn.com/rss/edition.rss",
  "https://www.reuters.com/rssFeed/worldNews",
  "https://www.nhk.or.jp/rss/news/cat0.xml",
  "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
  "https://www.aljazeera.com/xml/rss/all.xml",
  "https://www.nasa.gov/rss/dyn/breaking_news.rss"
  ];


// ===== 四個流程函式 =====
// 1. rss2json
async function fetchByRss2Json(rssUrl){
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl));
    const data = await res.json();
    if(data.items){
      return data.items.map(it => ({
        url: it.link,
        title: it.title,
        source: data.feed?.title || rssUrl,
        date: it.pubDate || new Date(),
        clicks: 0
      }));
    }
  } catch(e){ console.warn("rss2json 抓取失敗:", rssUrl, e); }
  return [];
}
// 2. thingproxy
async function fetchByThingProxy(rssUrl){
  try {
    const res = await fetch("https://thingproxy.freeboard.io/fetch/" + rssUrl);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "application/xml");
    const items = xml.querySelectorAll("item");
    return Array.from(items).map(item => ({
      title: item.querySelector("title")?.textContent || "",
      url: item.querySelector("link")?.textContent || "",
      source: rssUrl,
      date: item.querySelector("pubDate")?.textContent || new Date(),
      clicks: 0
    }));
  } catch(e){ console.warn("thingproxy 抓取失敗:", rssUrl, e); }
  return [];
}
// 3. cors-anywhere
async function fetchByCorsAnywhere(rssUrl){
  try {
    const res = await fetch("https://cors-anywhere.herokuapp.com/" + rssUrl);
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "application/xml");
    const items = xml.querySelectorAll("item");
    return Array.from(items).map(item => ({
      title: item.querySelector("title")?.textContent || "",
      url: item.querySelector("link")?.textContent || "",
      source: rssUrl,
      date: item.querySelector("pubDate")?.textContent || new Date(),
      clicks: 0
    }));
  } catch(e){ console.warn("cors-anywhere 抓取失敗:", rssUrl, e); }
  return [];
}
// 4. jsonp.afeld.me
async function fetchByJsonp(rssUrl){
  try {
    const res = await fetch("https://jsonp.afeld.me/?url=" + encodeURIComponent(rssUrl));
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "application/xml");
    const items = xml.querySelectorAll("item");
    return Array.from(items).map(item => ({
      title: item.querySelector("title")?.textContent || "",
      url: item.querySelector("link")?.textContent || "",
      source: rssUrl,
      date: item.querySelector("pubDate")?.textContent || new Date(),
      clicks: 0
    }));
  } catch(e){ console.error("jsonp.afeld.me 抓取失敗:", rssUrl, e); }
  return [];
}
// ===== 統一入口：依序呼叫四個流程 =====
async function fetchRSS(rssUrl){
  let items = await fetchByRss2Json(rssUrl);
  if(items.length === 0) items = await fetchByThingProxy(rssUrl);
  if(items.length === 0) items = await fetchByCorsAnywhere(rssUrl);
  if(items.length === 0) items = await fetchByJsonp(rssUrl);
  return items;
}
// ===== 主流程：跑全部 RSS =====
let rssLinks = [];
let currentPage = 1;
const itemsPerPage = 15;

async function fetchAll(){
  let items = [];
  for(const rssUrl of rssList){
    const feedItems = await fetchRSS(rssUrl); // 這裡自動跑四個流程
    items.push(...feedItems);
  }
  rssLinks = items;
  currentPage = 1;
  displayLinks();
}

// ===== 顯示與分頁 =====
function classify(t){
  t = (t||"").toLowerCase();
  if(t.includes("nasa")||t.includes("space")) return "news";
  return "news";
}
function displayLinks(){
  const list = document.getElementById("linkList");
  list.innerHTML = "";
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = rssLinks.slice(start, end);
  pageItems.forEach(link=>{
    if(!link.title || !link.url) return;
    const type = classify(link.title);
    const li = document.createElement("li");
    li.innerHTML = `
      <a href="${link.url}" target="_blank">${link.title}</a>
      <span class="badge ${type}">${type}</span>
      <div class="stats">
        來源: ${link.source || "未知"} | 點擊次數: ${link.clicks||0}
        | <a href="https://translate.google.com/translate?hl=zh-TW&sl=auto&u=${encodeURIComponent(link.url)}" target="_blank">🌐 Google翻譯</a>
      </div>
    `;
    list.appendChild(li);
  });
  renderPagination();
}

function renderPagination(){
  const totalPages = Math.ceil(rssLinks.length / itemsPerPage);
  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";
  // 上一頁按鈕
  if(currentPage > 1){
    const prevBtn = document.createElement("button");
    prevBtn.textContent = "上一頁";
    prevBtn.onclick = ()=>{ currentPage--; displayLinks(); };
    pagination.appendChild(prevBtn);
  }
  // 分頁數字按鈕
  for(let i=1; i<=totalPages; i++){
    const btn = document.createElement("button");
    btn.textContent = i;
    if(i === currentPage) btn.disabled = true;
    btn.onclick = ()=>{ currentPage = i; displayLinks(); };
    pagination.appendChild(btn);
  }
  // 下一頁按鈕
  if(currentPage < totalPages){
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "下一頁";
    nextBtn.onclick = ()=>{ currentPage++; displayLinks(); };
    pagination.appendChild(nextBtn);
  }
}
// ===== 啟動 =====
fetchAll();
setInterval(fetchAll,600000);



/* ===== 環境模組 (環境部 AQI JSON) ===== */
const map = L.map('map').setView([25.05, 121.5], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
// 顏色判斷函式
function getAQIColor(aqi){
  if(!aqi) return "gray";
  const val = parseInt(aqi, 10);
  if(val <= 50) return "green";       // 良好
  else if(val <= 100) return "orange"; // 普通
  else return "red";                  // 不良
}
// 載入 AQI 資料
async function loadAQI(){
  try {
    const res = await fetch("https://data.epa.gov.tw/api/v2/aqx_p_432?format=json");
    const data = await res.json();
    if(data.records){
      data.records.slice(0,10).forEach(station=>{
        if(station.Latitude && station.Longitude){
          const color = getAQIColor(station.AQI);
          L.circleMarker([parseFloat(station.Latitude), parseFloat(station.Longitude)], {
            radius: 8,
            fillColor: color,
            color: color,
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
          })
          .addTo(map)
          .bindTooltip(`${station.SiteName} AQI: ${station.AQI}`, { permanent: true });
        }
      });
    }
  } catch(e){
    console.warn("環境資料載入失敗", e);
  }
}
loadAQI();
// 加上圖例
const legend = L.control({position: 'bottomright'});
legend.onAdd = function (map) {
  const div = L.DomUtil.create('div', 'info legend');
  const labels = ["良好 (≤50)", "普通 (51-100)", "不良 (>100)"];
  const colors = ["green", "orange", "red"];
  for (let i = 0; i < labels.length; i++) {
    div.innerHTML +=
      `<i style="background:${colors[i]}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${labels[i]}<br>`;
  }
  return div;
};
legend.addTo(map);

/* ===== 通用抓取函式：官方 + 代理 + 自動重試 ===== */
async function fetchWorldBank(url, retryCount = 1){
  try {
    const res = await fetch("https://api.worldbank.org/v2/" + url);
    const data = await res.json();
    if(data[1]) return data[1];
  } catch(e){ console.warn("官方 API 失敗:", e); }
  try {
    const res = await fetch("https://thingproxy.freeboard.io/fetch/https://api.worldbank.org/v2/" + url);
    const data = await res.json();
    if(data[1]) return data[1];
  } catch(e){ console.error("代理也失敗:", e); }
  if(retryCount > 0){
    console.log("5 秒後重試一次...");
    await new Promise(resolve => setTimeout(resolve, 5000));
    return fetchWorldBank(url, retryCount - 1);
  }
  return [];
}

/* ===== 人口模組 (台灣、中國、日本、美國) ===== */
async function loadPopulation(){
  const data = await fetchWorldBank("country/TWN;CN;JP;US/indicator/SP.POP.TOTL?format=json&per_page=1000", 1);
  const tbody = document.querySelector("#population-table tbody");
  if(data.length > 0){
    tbody.innerHTML = data.map(d =>
      `<tr><td>${d.country.value}</td><td>${d.value ? (d.value/1000000).toFixed(1) : "N/A"}</td></tr>`
    ).join("");
  } else {
    tbody.innerHTML = "<tr><td colspan='2'>人口資料載入失敗</td></tr>";
  }
}
loadPopulation();

/* ===== 經濟模組 (台灣、中國、日本、美國) ===== */
async function loadEconomy(){
  const data = await fetchWorldBank("country/TWN;CN;JP;US/indicator/NY.GDP.MKTP.CD?format=json&per_page=1000", 1);
  if(data.length > 0){
    const labels = data.map(d=>d.country.value);
    const values = data.map(d=> d.value ? (d.value/1000000000000).toFixed(2) : "N/A"); // 兆美元
    const ctx2 = document.getElementById('economy-chart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'GDP (兆美元)',
          data: values,
          backgroundColor: ['green','orange','blue','red']
        }]
      }
    });
  } else {
    document.getElementById("economy-chart").outerHTML = "<p>經濟資料載入失敗</p>";
  }
}
loadEconomy();


// 定義字型清單
const fonts = [
  '"Noto Sans TC"',       // 思源黑體
  '"Noto Serif TC"',      // 思源宋體
  '"Microsoft JhengHei"', // 微軟正黑體
  '"PingFang TC"',        // 蘋方字體
  'sans-serif'            // 保底
];
// 隨機挑一個字型
const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
// 套用到 h1，並加上完整 fallback 順序
document.querySelector("h1").style.fontFamily =
`${randomFont}, "Noto Sans TC", "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", sans-serif`;
</script>
</body>
</html>
