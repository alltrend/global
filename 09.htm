#wave, #bars {

.neon-text span {
  font-size: 1.3em;
  font-weight: bold;
  animation: neon-flash 2s infinite;
  display: inline-block;
}
/* 每個字不同顏色 */
.neon-text span:nth-child(1) { color: red; animation-delay: 0s; }
.neon-text span:nth-child(2) { color: orange; animation-delay: 0.2s; }
.neon-text span:nth-child(3) { color: yellow; animation-delay: 0.4s; }
.neon-text span:nth-child(4) { color: #00BFFF; animation-delay: 0.6s; }
.neon-text span:nth-child(5) { color: #1E90FF; animation-delay: 0.8s; }
.neon-text span:nth-child(6) { color: #66B3FF; animation-delay: 1s; }
.neon-text span:nth-child(7) { color: pink; animation-delay: 1.2s; }
.neon-text span:nth-child(8) { color: gold; animation-delay: 1.4s; }
.neon-text span:nth-child(9) { color: #87CEFA; animation-delay: 1.6s; }
.neon-text span:nth-child(10) { color: #00BFFF; animation-delay: 1.8s; }
.neon-text span:nth-child(11) { color: #FF69B4; animation-delay: 2s; }
.neon-text span:nth-child(12) { color: #FFD700; animation-delay: 2.2s; }
/* 閃爍效果 */
@keyframes neon-flash {
  0%, 100% { opacity: 1; text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
  50% { opacity: 0.5; text-shadow: none; }
}


/* Reset */

html,body {

<script>
// ==============================
// ⚠️ 版本提示：
// 版本 - 系統負擔優化版
// 功能：降低 FFT、條狀棒數量、波形取樣間隔，
//       定時 reload 作為備援。
// 適用：想長時間播放穩定、減少 CPU 使用
// ==============================

let audio = document.getElementById("audioPlayer");
let video = document.getElementById("videoPlayer");
const select = document.getElementById("streamSelect");
const statusEl = document.getElementById("status");
const volumeEl = document.getElementById("volume");
const muteBtn = document.getElementById("muteBtn");
const favBtn = document.getElementById("favBtn");
const removeFavBtn = document.getElementById("removeFavBtn");

let isMuted = false;
let hls;
let audioCtx, analyser, bufferLength, freqData, waveData;
let currentSource = null;

// -------------------------
// 重建 audio/video
// -------------------------
function resetMediaElement(oldEl) {
  const newEl = oldEl.cloneNode(true);
  oldEl.replaceWith(newEl);
  return newEl;
}

// -------------------------
// 播放邏輯
// -------------------------
function playStream(url){
  audio.pause();
  video.pause();

  audio = resetMediaElement(audio);
  video = resetMediaElement(video);

  if(hls){ hls.destroy(); hls=null; }
  audio.removeAttribute("src");
  video.removeAttribute("src");

  if(url.endsWith(".m3u8")){
    video.style.display = "none";
    video.style.width = "0px";
    video.style.height = "0px";
    video.style.opacity = 0;

    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        video.muted = isMuted;
        video.volume = parseFloat(volumeEl.value);
        video.play();
        connectAnalyser(video);
      });
    } else {
      video.src = url;
      if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      video.play();
      connectAnalyser(video);
    }
  } else {
    video.style.display="none";
    audio.style.display="block";

    audio.src = url;
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    audio.muted = isMuted;
    audio.volume = parseFloat(volumeEl.value);
    audio.play();
    connectAnalyser(audio);
  }

  const channelName = select.options[select.selectedIndex].text;
  statusEl.textContent = "正在播放：" + channelName;
  localStorage.setItem("lastChannel", url);
}

// -------------------------
// 連接音源
// -------------------------
function connectAnalyser(element){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(currentSource){ currentSource.disconnect(); }

  currentSource = audioCtx.createMediaElementSource(element);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512; // 減半 FFT
  bufferLength = analyser.frequencyBinCount;
  freqData = new Uint8Array(bufferLength);
  waveData = new Uint8Array(bufferLength);

  currentSource.connect(analyser);
  analyser.connect(audioCtx.destination);

  drawVisuals();
}

// -------------------------
// 視覺化（降低負擔）
// -------------------------
function drawVisuals(){
  const barsCanvas = document.getElementById("bars");
  const barsCtx = barsCanvas.getContext("2d");
  const waveCanvas = document.getElementById("wave");
  const waveCtx = waveCanvas.getContext("2d");

  function loop(){
    analyser.getByteFrequencyData(freqData);
    barsCtx.clearRect(0,0,barsCanvas.width,barsCanvas.height);

    const barCount = 32; // 減少條狀棒數量
    const barWidth = barsCanvas.width / barCount;
    let x = 0;

    for (let i = 0; i < barCount; i++) {
      const idx = Math.floor(i * (bufferLength / barCount));
      const h = freqData[idx] * 0.4;
      barsCtx.fillStyle = `hsl(${(i/barCount)*360}, 100%, 50%)`;
      barsCtx.fillRect(x, barsCanvas.height - h, barWidth - 2, h);
      x += barWidth;
    }

    // 波形間隔降低
    analyser.getByteTimeDomainData(waveData);
    waveCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
    waveCtx.lineWidth = 7;
    waveCtx.strokeStyle = "skyblue";
    waveCtx.beginPath();

    const sliceWidth = waveCanvas.width / bufferLength;
    let x2 = 0;
    for(let i=0;i<bufferLength;i+=2){ // 每 2 點畫一次
      const v = waveData[i]/128.0;
      const y = v*waveCanvas.height/2;
      if(i===0) waveCtx.moveTo(x2,y);
      else waveCtx.lineTo(x2,y);
      x2 += sliceWidth*2;
    }
    waveCtx.lineTo(waveCanvas.width,waveCanvas.height/2);
    waveCtx.stroke();

    requestAnimationFrame(loop);
  }
  loop();
}

// -------------------------
// 收藏功能 & 控制按鈕

function loadFavorites(){
  const favs = JSON.parse(localStorage.getItem("favorites")||"[]");

    const opt=document.createElement("option");
    opt.value=f.url; opt.textContent=f.name;
    favGroup.appendChild(opt);
  });
}
favBtn.addEventListener("click", ()=>{
  if(select.value){
    const favs = JSON.parse(localStorage.getItem("favorites")||"[]");
    if(!favs.find(f=>f.url===select.value)){
      favs.push({url:select.value,name:select.options[select.selectedIndex].text});
      localStorage.setItem("favorites", JSON.stringify(favs));
      loadFavorites();
      statusEl.textContent="已加入收藏！";
    } else statusEl.textContent="已在收藏清單中";
  }
});
removeFavBtn.addEventListener("click", ()=>{
  if(select.value){
    let favs = JSON.parse(localStorage.getItem("favorites")||"[]");
    const before = favs.length;
    favs = favs.filter(f=>f.url!==select.value);
    localStorage.setItem("favorites", JSON.stringify(favs));
    loadFavorites();
    select.value="";
    statusEl.textContent = favs.length<before ? "已移除收藏" : "這個頻道不在收藏清單中";
  }
});

select.addEventListener("change", ()=>{ if(select.value) playStream(select.value); });
document.getElementById("playBtn").addEventListener("click", ()=>{ if(select.value) playStream(select.value); });
document.getElementById("pauseBtn").addEventListener("click", ()=>{
  audio.pause(); video.pause(); statusEl.textContent="已暫停";
});

function reloadPage(){
location.reload();
}

// -------------------------
// 備援 reload 每 360 分鐘
// -------------------------
setInterval(()=>{
  const last = localStorage.getItem("lastChannel");
  if(last){
    statusEl.textContent="定時強制 reload 頻道...";

  }

// === 粒子動畫 ===
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let colors = ['#87CEEB','#7A3FFF','#FF3C3C','#FFD700','#00BFFF','#FF69B4','#ADFF2F'];
let particles = [], stars = [];
for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*8+4,
    dx:(Math.random()-0.5)*3,
    dy:(Math.random()-0.5)*3,
    color:colors[Math.floor(Math.random()*colors.length)],
    alpha:Math.random()*0.8+0.2
  });
}
particles.forEach(p=>{
  p.update = function(){
    if(Math.random()<0.02) p.color=colors[Math.floor(Math.random()*colors.length)];
    ctx.beginPath();
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.alpha;
    ctx.shadowBlur=30;
    ctx.shadowColor=p.color;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  };
});


class Star{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.radius=Math.random()*3+2;
    this.opacity=Math.random();
    this.fade=Math.random()*0.02;
    this.color=`hsl(${200 + Math.random()*100},80%,70%)`;
  }
  draw(){
    const gradient=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius*2);
    gradient.addColorStop(0,this.color);
    gradient.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=gradient;
    ctx.globalAlpha=this.opacity;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius*2,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
  update(){
    this.opacity+=this.fade;
    if(this.opacity>1||this.opacity<0) this.fade*=-1;
    this.draw();
  }
}
stars = Array.from({length:200},()=>new Star());

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // ⭐ 重新生成星星
  stars = Array.from({ length: 200 }, () => new Star());
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();


// 星雲
let nebulaOpacity1=0.5, fade1=0.01, nebulaOpacity2=0.3, fade2=0.007, nebulaOpacity3=0.2, fade3=0.005;
function drawNebula(){
  const g1=ctx.createRadialGradient(canvas.width/2,canvas.height/2,100,canvas.width/2,canvas.height/2,canvas.width/1.2);
  g1.addColorStop(0,`rgba(255,100,255,${nebulaOpacity1})`);
  g1.addColorStop(0.5,`rgba(255,50,150,${nebulaOpacity1*0.8})`);
  g1.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g1; ctx.fillRect(0,0,canvas.width,canvas.height);

  const g2=ctx.createRadialGradient(canvas.width/2,canvas.height/2,50,canvas.width/2,canvas.height/2,canvas.width/1.5);
  g2.addColorStop(0,`rgba(100,200,255,${nebulaOpacity2})`);
  g2.addColorStop(0.5,`rgba(50,255,200,${nebulaOpacity2*0.7})`);
  g2.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g2; ctx.fillRect(0,0,canvas.width,canvas.height);

  const g3=ctx.createRadialGradient(canvas.width/2,canvas.height/2,150,canvas.width/2,canvas.height/2,canvas.width/1.8);
  g3.addColorStop(0,`rgba(255,180,50,${nebulaOpacity3})`);
  g3.addColorStop(0.5,`rgba(255,120,0,${nebulaOpacity3*0.6})`);
  g3.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g3; ctx.fillRect(0,0,canvas.width,canvas.height);

  nebulaOpacity1+=fade1; if(nebulaOpacity1>0.9||nebulaOpacity1<0.2) fade1*=-1;
  nebulaOpacity2+=fade2; if(nebulaOpacity2>0.7||nebulaOpacity2<0.1) fade2*=-1;
  nebulaOpacity3+=fade3; if(nebulaOpacity3>0.6||nebulaOpacity3<0.05) fade3*=-1;
}

// 星系旋轉
let angle=0;
function drawGalaxy(){
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(angle);
  for(let i=0;i<150;i++){
    const dist=i*3;
    const x=dist*Math.cos(i*0.1);
    const y=dist*Math.sin(i*0.1);
    ctx.beginPath();
    ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${200+i},80%,70%,0.7)`;
    ctx.fill();
  }
  ctx.restore();
  angle+=0.002;
}

// ==== 流星（尾巴漸短拖尾 + 多彩閃爍） ====
class Meteor {
  constructor(){
    const directions = ['down','up','left','right'];
    this.direction = directions[Math.floor(Math.random()*4)];
    this.reset();
  }

  reset(){
    // 流星顏色隨機
    this.color = `hsl(${Math.random()*360}, 80%, 70%)`;

    switch(this.direction){
      case 'down':
        this.x = Math.random() * canvas.width;
        this.y = -Math.random() * canvas.height/2;
        this.vx = Math.random()*5;
        this.vy = Math.random()*10 + 5;
        break;
      case 'up':
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random()*canvas.height/2;
        this.vx = -Math.random()*5;
        this.vy = -(Math.random()*10 + 5);
        break;
      case 'right':
        this.x = -Math.random()*canvas.width/2;
        this.y = Math.random() * canvas.height;
        this.vx = Math.random()*10 + 5;
        this.vy = -Math.random()*5;
        break;
      case 'left':
        this.x = canvas.width + Math.random()*canvas.width/2;
        this.y = Math.random() * canvas.height;
        this.vx = -(Math.random()*10 + 5);
        this.vy = Math.random()*5;
        break;
    }

    this.length = Math.random()*80 + 20;

    // 白光霧狀閃爍參數
    this.glowAlpha = Math.random()*0.5 + 0.5;
    this.glowChange = Math.random()*0.05 + 0.01;
  }

  draw(){
    ctx.save();

    // 流星彩色線條
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);

    // ✅ 唯一修改：從「直的」改成「橫的」
    ctx.lineTo(this.x - this.vy*5, this.y + this.vx*5);

    ctx.stroke();

    // 外圍白光霧狀閃爍
    ctx.shadowBlur = 15;
    ctx.shadowColor = `rgba(255,255,255,${this.glowAlpha})`;
    ctx.stroke();

    ctx.restore();
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;

    // 光暈閃爍
    this.glowAlpha += this.glowChange;
    if(this.glowAlpha > 1 || this.glowAlpha < 0.3) this.glowChange *= -1;

    // 超出邊界重生
    if(this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100){
      const directions = ['down','up','left','right'];
      this.direction = directions[Math.floor(Math.random()*4)];
      this.reset();
    }

    this.draw();
  }
}

// 初始化 20 顆流星
let meteors = [];
const meteorCount = 20;
for(let i=0;i<meteorCount;i++){
  meteors.push(new Meteor());
}

// ==== 單一動畫循環（保留原有粒子與星星） ====
let showParticles = true;
let alphaParticles = 1, alphaStars = 0;
const switchInterval = 10;
let switchTimer = 0;

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawNebula();
  drawGalaxy();

  if(showParticles){
    alphaParticles = Math.min(alphaParticles + 0.01, 1);
    alphaStars = Math.max(alphaStars - 0.01, 0);
  } else {
    alphaParticles = Math.max(alphaParticles - 0.01, 0);
    alphaStars = Math.min(alphaStars + 0.01, 1);
  }

  particles.forEach(p => { ctx.globalAlpha = alphaParticles; p.update(); });
  stars.forEach(s => { ctx.globalAlpha = alphaStars; s.update(); });
  ctx.globalAlpha = 1;

  // ==== 流星更新 ====
  meteors.forEach(m => m.update());

  switchTimer += 1/60;
  if(switchTimer >= switchInterval){
    showParticles = !showParticles;
    switchTimer = 0;
  }

  requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

animate();
</script>
</body>
</html>
