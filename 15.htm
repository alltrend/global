/* 粒子背景 */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;}

/* 中央光暈（自然冷色呼吸版） */
.ellipse {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 70vw;
  height: 70vw;
  max-width: 1000px;
  max-height: 1000px;
  border-radius: 50%;
  background:
    radial-gradient(circle at center,
      rgba(120,170,255,0.95) 0%,
      rgba(120,140,255,0.75) 22%,
      rgba(180,120,255,0.55) 45%,
      rgba(255,120,220,0.28) 65%,
      rgba(10,20,40,0.05) 85%,
      transparent 100%);
  box-shadow:
    0 0 120px rgba(120,170,255,0.35),
    0 0 240px rgba(180,120,255,0.22),
    0 0 360px rgba(255,120,220,0.12);
  transform: translate(-50%, -50%) scale(1);
  opacity: 0.9;
  filter: blur(24px);
  animation:
    ellipseBreath 10s ease-in-out infinite,
    colorShift 18s ease-in-out infinite;
  z-index: -2;
  pointer-events: none;
}

/* 呼吸 */
@keyframes ellipseBreath {
  0%,100%{
    transform:translate(-50%,-50%) scale(0.75);
    opacity:0.72;
    filter:blur(28px);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.45);
    opacity:1;
    filter:blur(10px);
  }
}

/* 顏色微變化（不經過綠色） */
@keyframes colorShift {
  0%{
    background:
      radial-gradient(circle at center,
        rgba(120,170,255,0.95) 0%,
        rgba(120,140,255,0.75) 22%,
        rgba(180,120,255,0.55) 45%,
        rgba(255,120,220,0.28) 65%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
  50%{
    background:
      radial-gradient(circle at center,
        rgba(150,120,255,0.95) 0%,
        rgba(120,160,255,0.72) 25%,
        rgba(220,120,255,0.5) 48%,
        rgba(255,140,200,0.22) 68%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
  100%{
    background:
      radial-gradient(circle at center,
        rgba(120,170,255,0.95) 0%,
        rgba(120,140,255,0.75) 22%,
        rgba(180,120,255,0.55) 45%,
        rgba(255,120,220,0.28) 65%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
}

function semanticSearchModule() {
  const userText = input.value.trim();
  const keywords = ["查一下","幫我找","幫我查","搜尋","找一下","想知道"];
  const matched = keywords.find(kw => userText.includes(kw));
  if (!matched) return null;
  const query = userText.replace(/查一下|幫我找|幫我查|搜尋|找一下|想知道/g,"").trim();
  if (!query) return null;
  showSearchPopup(query);
  return `你似乎想查「${query}」，請選擇是否要搜尋。`;
}

function learnedModule() {
  const msg = input.value.trim();
  if (msg === "") return null;
  if (!learnedSentences.includes(msg)) {
    learnedSentences.push(msg);
    return `我學會了你說的「${msg}」！下次我會記得。`;
  }
  return null;
}

const modules = [semanticSearchModule, randomResponseModule, learnedModule];

function processInput() {
  const userMsg = input.value.trim();
  if (!userMsg) return;
  addMessage("user", userMsg);
  let response = null;
  for (let mod of modules) {
    response = mod();
    if (response) break;
  }
  if (!response) response = "⊗☉…（翻譯：我不太懂你的意思，可以換個說法嗎？）";
  addMessage("ai", response);
  input.value = "";
}

sendBtn.onclick = processInput;
input.addEventListener("keydown", e => { if (e.key === "Enter") processInput(); });

  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hour = String(now.getHours()).padStart(2, '0');
  const minute = String(now.getMinutes()).padStart(2, '0');

}

// 多彩漸變粒子動畫 + 光暈 + 自適應
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
let globalHue = 0; // 全域色相，隨時間增加

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initParticles();
}
window.addEventListener('resize', resize);

// 根據螢幕大小自適應粒子數量與大小
function initParticles() {
  particles = [];
  const baseNum = 50;
  const scaleFactor = Math.min(W, H) / 500;
  const NUM = Math.floor(baseNum * scaleFactor * 1.5); // 桌機多、手機少

  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: (1 + Math.random() * 2) * (6 * scaleFactor),
      dx: (Math.random() - 0.5) * 1.5,
      dy: (Math.random() - 0.5) * 1.5,
      offset: Math.random() * 360 // 每顆粒子色相偏移
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  globalHue += 0.5; // 每次刷新增加色相
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const hue = (globalHue + p.offset) % 360;
    ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
    ctx.shadowBlur = 30;          // 光暈效果
    ctx.shadowColor = ctx.fillStyle;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > W) p.dx *= -1;
    if (p.y < 0 || p.y > H) p.dy *= -1;
  }
  requestAnimationFrame(draw);
}
resize();
draw();
</script>
