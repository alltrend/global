// ========================= 3-1 粒子背景 =========================
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let particles = [];
const colors = ["#00ffff","#ff00ff","#00ff66","#ffff00","#ff6666","#66aaff"];

function createParticles(){
  particles = [];
  const baseCount = 60;  
  const adaptiveCount = Math.floor((window.innerWidth * window.innerHeight) / 70000);
  const particleCount = Math.min(baseCount + adaptiveCount, 150);
  const sizeFactor = Math.max(window.innerWidth, window.innerHeight) / 800;
  for(let i=0;i<particleCount;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      radius:(6+Math.random()*10) * sizeFactor,
      color:colors[Math.floor(Math.random()*colors.length)],
      dx:(Math.random()-0.5)*2,
      dy:(Math.random()-0.5)*2
    });
  }
}
function resizeCanvas(){ 
  canvas.width=window.innerWidth; 
  canvas.height=window.innerHeight; 
  createParticles(); 
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function animate(){
  ctx.fillStyle="#0b5ea8"; 
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath(); 
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle=p.color; 
    ctx.shadowColor=p.color; 
    ctx.shadowBlur=40; 
    ctx.fill();
    p.x+=p.dx; 
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(animate);
}
animate();

function semanticSearchModule(){
  const userText=input.value.trim();
  const keywords=["查一下","幫我找","幫我查","搜尋","找一下","想知道","有甚麼資訊"];
  const matched=keywords.find(kw=>userText.includes(kw));
  if(!matched) return null;
  const query=userText.replace(/幫我查一下|幫我查|幫我找|查一下|搜尋|找一下|想知道|有甚麼資訊/g,"").trim();
  if(!query) return null;
  currentLinks=getLinks(query);
  currentIndex=Math.floor(Math.random()*currentLinks.length);
  showIframe();
  return `你似乎想查「${query}」，我已經幫你準備推薦連結。`;
}

function searchModule(){
  const engines={ google:"https://www.google.com/search?q=", bing:"https://www.bing.com/search?q=", youtube:"https://www.youtube.com/results?search_query=" };
  for(const key in engines){
    if(input.value.toLowerCase().startsWith(key+" ")){
      let keyword=input.value.slice(key.length).trim();
      let url=`${engines[key]}${encodeURIComponent(keyword)}`;
      window.open(url,"_blank");
      addMessage("ai",`我已幫你用 ${key} 搜尋「${keyword}」 👉 ${url}`);
      return `已開啟 ${key} 搜尋「${keyword}」`;
    }
  }
  return null;
}

function learnedModule(){
  const msg=input.value.trim();
  if(msg==="") return null;
  if(!learnedSentences.includes(msg)){
    learnedSentences.push(msg);
    return `我學會了你說的「${msg}」！下次我會記得。`;
  }
  return null;
}

const modules=[semanticSearchModule,searchModule,randomResponseModule,learnedModule];

function processInput(){
  const userMsg=input.value.trim();
  if(!userMsg) return;
  addMessage("user",userMsg);
  let response=null;
  for(let mod of modules){ response=mod(); if(response) break; }
  if(!response) response="我不太懂你的意思，可以換個說法嗎？";
  addMessage("ai",response);
  input.value="";
}

sendBtn.onclick=processInput;
input.addEventListener("keydown",e=>{ if(e.key==="Enter") processInput(); });
document.getElementById("clearBtn").addEventListener("click",()=>{
  messages.innerHTML="";

});
