    body {

      background: #005FAF;

    h1 {
      filter: blur(1.2px);
      font-size: 55px;
      font-weight: bold;
      margin-top: 0; 
      margin-bottom: 0;    /* 下方距離可依需求調整 */
      position: relative;
      z-index: 5;
      animation: rainbow 15s infinite linear;
      text-shadow: 0 0 30px currentColor, 0 0 50px currentColor;
    }

    @keyframes rainbow {
  /* 粉紅系起始 */
  0%   { color: #FF00CC; text-shadow: 0 0 50px #FF00CC; }
  5%   { color: #FF3399; text-shadow: 0 0 50px #FF3399; }
  10%  { color: #FF66CC; text-shadow: 0 0 50px #FF66CC; }
  15%  { color: #FF3366; text-shadow: 0 0 50px #FF3366; }
  /* 暖色段 */
  20%  { color: #FF6600; text-shadow: 0 0 50px #FF6600; }
  25%  { color: #FF9933; text-shadow: 0 0 50px #FF9933; }
  30%  { color: #FFCC66; text-shadow: 0 0 50px #FFCC66; }
  35%  { color: #FFFF66; text-shadow: 0 0 50px #FFFF66; }
  /* 紅色爆發 */
  42%  { color: #FF0000; text-shadow: 0 0 50px #FF0000; }
  48%  { color: #FF3333; text-shadow: 0 0 50px #FF3333; }
  54%  { color: #FF6666; text-shadow: 0 0 50px #FF6666; }
  /* 青藍過渡（你原本的 #00FFFF 放這裡） */
  60%  { color: #00FFFF; text-shadow: 0 0 50px #00FFFF; }
  66%  { color: #3399FF; text-shadow: 0 0 50px #3399FF; }
  72%  { color: #66CCFF; text-shadow: 0 0 50px #66CCFF; }
  78%  { color: #99CCFF; text-shadow: 0 0 50px #99CCFF; }
  /* 紫色收束（補你想要的 #9966FF / #FF00FF） */
  84%  { color: #9966FF; text-shadow: 0 0 50px #9966FF; }
  90%  { color: #FF00FF; text-shadow: 0 0 50px #FF00FF; }
  96%  { color: #FF99FF; text-shadow: 0 0 50px #FF99FF; }
  /* 回到起點 */
  100% { color: #FF00CC; text-shadow: 0 0 50px #FF00CC; }
}


  #breathingCircle {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 350px; height: 350px;
  border-radius: 50%;
  animation: pulse 8s infinite alternate, circleColors 60s infinite linear;
  filter: blur(100px);
  box-shadow: 0 0 120px #FF00CC, 0 0 160px #FFFF66, 0 0 200px #00FFFF;
  z-index: -1; /* 粒子上方，文字下方 */
}
@keyframes pulse {
  from { transform: translate(-50%, -50%) scale(1); }
  to   { transform: translate(-50%, -50%) scale(1.4); }
}
@keyframes circleColors {
  0%   { background: radial-gradient(circle, #FF00CC, transparent); }
  5%   { background: radial-gradient(circle, #FF3399, transparent); }
  10%  { background: radial-gradient(circle, #FF66CC, transparent); }
  15%  { background: radial-gradient(circle, #FF99FF, transparent); }
  20%  { background: radial-gradient(circle, #FF3366, transparent); }
  25%  { background: radial-gradient(circle, #FF6699, transparent); }
  30%  { background: radial-gradient(circle, #FF99CC, transparent); }
  35%  { background: radial-gradient(circle, #FFCCFF, transparent); }
  40%  { background: radial-gradient(circle, #FF6600, transparent); }
  45%  { background: radial-gradient(circle, #FF9933, transparent); }
  50%  { background: radial-gradient(circle, #FFCC66, transparent); }
  55%  { background: radial-gradient(circle, #FFFF66, transparent); }

    input, button {

/* 📱 小型手機（小於 480px） */
@media (max-width: 479px) {

// 自動語言偵測 (Unicode 區段)
function detectLanguage(text) {
  // 中文（你原本缺這個，致命問題）
  if (/[\u4E00-\u9FFF]/.test(text)) return "zh";
  // 日文
  if (/[\u3040-\u30FF]/.test(text)) return "ja";
  // 韓文
  if (/[\uAC00-\uD7AF]/.test(text)) return "ko";
  // 俄文
  if (/[\u0400-\u04FF]/.test(text)) return "ru";
  // 泰文
  if (/[\u0E00-\u0E7F]/.test(text)) return "th";
  // 寮國文
  if (/[\u0E80-\u0EDF]/.test(text)) return "lo";
  // 印地文
  if (/[\u0900-\u097F]/.test(text)) return "hi";
  // 孟加拉文
  if (/[\u0980-\u09FF]/.test(text)) return "bn";
  // 阿拉伯文
  if (/[\u0600-\u06FF]/.test(text)) return "ar";
  // 柬埔寨文
  if (/[\u1780-\u17FF]/.test(text)) return "km";
  // 緬甸文
  if (/[\u1000-\u109F]/.test(text)) return "my";
  // 英文（你原本完全沒有）
  if (/^[a-zA-Z0-9\s.,!?'"()\-]+$/.test(text))
    return "en";
  return "unknown";
}
function getEngineScores(query) {
  let scores = {
    google: 25,
    bing: 25,
    yahoo: 25,
    baidu: 25
  };
  const lang = detectLanguage(query);
  const browserLang = (navigator.language || "").toLowerCase();

  // =========================
  // ① 搜尋內容語言權重
  // =========================
  switch (lang) {
    case "zh":
      scores.google += 25;
      scores.bing += 25;
      break;
    case "ja":
      scores.yahoo += 40;
      scores.google += 20;
      break;
    case "ko":
      scores.google += 30;
      scores.yahoo += 20;
      break;
    case "en":
      scores.google += 40;
      scores.bing += 20;
      break;
    case "ru":
      scores.google += 30;
      break;
    case "th":
    case "lo":
    case "hi":
    case "bn":
    case "km":
    case "my":
      scores.google += 30;
      break;
    case "ar":
      scores.google += 30;
      scores.bing += 20;
      break;
  }

  // =========================
  // ② 瀏覽器語言權重（更穩）
  // =========================
  if (browserLang.startsWith("zh-cn")) {
    scores.baidu += 35;
  }
  else if (browserLang.startsWith("zh-tw")) {
    scores.google += 20;
    scores.bing += 20;
  }
  else if (browserLang.startsWith("ja")) {
    scores.yahoo += 25;
  }
  else if (browserLang.startsWith("ko")) {
    scores.google += 15;
  }
  else if (browserLang.startsWith("en")) {
    scores.google += 15;
    scores.bing += 15;
  }

  // =========================
  // ③ 找最高分（保留你原本寫法）
  // =========================
  let bestEngine = null;
  let maxScore = -1;
  for (let engine in scores) {
    if (scores[engine] > maxScore) {
      maxScore = scores[engine];
      bestEngine = engine;
    }
  }
  return { bestEngine, scores };
}
function autoSearch() {
  let query = document.getElementById("query").value.trim();
  if (query === "") {
    document.getElementById("result").innerText =
      "AI 判斷失敗 → 請手動選擇搜尋引擎";
    showModal();
    return;
  }
  let { bestEngine, scores } = getEngineScores(query);
  document.getElementById("result").innerText =
    "AI 建議 → 使用 " +
    bestEngine.toUpperCase() +
    " 搜尋: " +
    query;
  window.open(
    engines[bestEngine] + encodeURIComponent(query),
    "_blank"
  );
}
function manualSearch() {
  let query = document.getElementById("query").value.trim();
  let engine = document.getElementById("engine").value;
  document.getElementById("result").innerText =
    "手動選擇 → 使用 " +
    engine.toUpperCase() +
    " 搜尋: " +
    query;
  window.open(
    engines[engine] + encodeURIComponent(query),
    "_blank"
  );
  closeModal();
}
function showModal() {
  let query = document.getElementById("query").value.trim();
  let { bestEngine, scores } = getEngineScores(query);
  document.getElementById("aiSuggestion").innerText =
    "AI 建議使用 " + bestEngine.toUpperCase();
  document.getElementById("engine").value = bestEngine;
  let barsHTML = "";
  for (let e in scores) {
    barsHTML += `
      <div>${e.toUpperCase()} (${scores[e]}%)</div>
      <div class="bar-container">
        <div class="bar ${e}" style="width:${scores[e]}%">
          ${scores[e]}%
        </div>
      </div>
    `;
  }
  document.getElementById("bars").innerHTML = barsHTML;
  document.getElementById("selectModal").style.display = "block";
}

function closeModal() {
  document.getElementById("selectModal").style.display = "none";
}
window.onclick = function(event) {
  let modal = document.getElementById("selectModal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};

    // 粒子背景動畫
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];
    const colors = [
      "#FF0080","#FF8000","#0080FF","#FF00FF","#FFFF00",
      "#00FFFF","#FF1493","#FFD700","#FF4500","#1E90FF",
      "#FF69B4","#FFA500","#00CED1","#FF6347","#87CEFA",
      "#FFB6C1","#FF7F50","#00BFFF","#FF85A1","#FFDAB9",
      "#FF5F1F","#FF99CC","#FFDD00","#FF3366","#FFAA00"
    ]; // 26 色亮色系，已去除綠色

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: 15 + Math.random() * 15, // 粒子大小 15~30px
          color: colors[Math.floor(Math.random() * colors.length)],
          dx: (Math.random() - 0.5) * 2,
          dy: (Math.random() - 0.5) * 2
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 30; // 光暈效果
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(drawParticles);
    }

    initParticles();
    drawParticles();
    
    
  document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("query").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      event.preventDefault(); // 防止表單預設提交
      autoSearch(); // 呼叫正確的搜尋函式
    }
  });
});
